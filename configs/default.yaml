# Default PPO hyperparameters for Jadid_Halghe
# Run: python train.py --config configs/default.yaml

world:
  width: 2000.0           # 2000×2000 — denser encounters; ~7 radii avg spacing at 32 agents
  height: 2000.0
  target_food_count: 200  # proportional density ≈ 150, bumped to keep ~6 food tokens per agent
  target_virus_count: 2
  max_players: 32         # must be >= n_agents; default WorldConfig cap is 16

env:
  n_envs: 1          # single visible world
  n_agents: 32       # 32 RL agents competing in that world (was 4 worlds × 16)
  max_ticks: 1500    # episode length (~60 s at 25 TPS); long enough for mass-growth arcs
  survival_bonus: 0.01  # reward per tick for staying alive; 0.01 = food_mass/start_mass

policy:
  type: attention    # mlp | attention | recurrent
  # MLPPolicy / RecurrentPolicy
  hidden_dim: 256
  # AttentionPolicy
  embed_dim: 64
  n_heads: 4
  n_layers: 2
  # RecurrentPolicy only
  gru_hidden: 128

ppo:
  n_steps: 2048      # rollout steps per env (total batch = n_steps × n_agents = 65536)
  n_epochs: 8        # gradient passes per rollout (was 4)
  batch_size: 2048   # minibatch size (was 256); bigger batches → better GPU utilisation
  clip_range: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  lr: 3.0e-4

train:
  total_steps: 10_000_000
  log_interval: 1        # rollouts between TensorBoard log writes
  save_interval: 100     # rollouts between checkpoint saves
  video_interval: 50     # rollouts between training videos (0 = disabled)
  video_ticks: 300       # ticks to simulate per training video
  checkpoint_dir: checkpoints/run_default
  seed: 0

# Self-play opponent pool (uncomment to enable — only works when n_agents == 0)
# selfplay:
#   pool_size: 20           # max snapshots kept in the ring buffer
#   update_interval: 50     # rollouts between pool snapshots
#   selfplay_prob: 0.8      # fraction of rollouts using pool vs random walk
