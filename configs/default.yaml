# Default PPO hyperparameters for Jadid_Halghe
# Run: python train.py --config configs/default.yaml

world:
  width: 4000.0           # real agar.io is 14142 — smaller world = denser food & agent encounters
  height: 4000.0
  target_food_count: 600  # keeps food density proportional to full-scale default (2000 @ 14142²)
  target_virus_count: 4

env:
  n_envs: 4          # parallel worlds (was 3)
  n_agents: 16       # RL-controlled agents per world (was 8); set to 0 to use random bots instead
  max_ticks: 1000    # episode length before truncation (~40 s at 25 TPS; was 2000)
  survival_bonus: 0.01  # reward per tick for staying alive; 0.01 = food_mass/start_mass

policy:
  type: attention    # mlp | attention | recurrent
  # MLPPolicy / RecurrentPolicy
  hidden_dim: 256
  # AttentionPolicy
  embed_dim: 64
  n_heads: 4
  n_layers: 2
  # RecurrentPolicy only
  gru_hidden: 128

ppo:
  n_steps: 512       # rollout steps per env (total batch = n_steps × n_envs = 1536)
  n_epochs: 4        # gradient passes per rollout
  batch_size: 256
  clip_range: 0.2
  value_coef: 0.5
  entropy_coef: 0.01
  max_grad_norm: 0.5
  gamma: 0.99
  gae_lambda: 0.95
  lr: 3.0e-4

train:
  total_steps: 10_000_000
  log_interval: 1        # rollouts between TensorBoard log writes
  save_interval: 100     # rollouts between checkpoint saves
  video_interval: 50     # rollouts between training videos (0 = disabled)
  video_ticks: 300       # ticks to simulate per training video
  checkpoint_dir: checkpoints/run_default
  seed: 0

# Self-play opponent pool (uncomment to enable — only works when n_agents == 0)
# selfplay:
#   pool_size: 20           # max snapshots kept in the ring buffer
#   update_interval: 50     # rollouts between pool snapshots
#   selfplay_prob: 0.8      # fraction of rollouts using pool vs random walk
